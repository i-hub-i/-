<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>文章推敲＆メール返信AIアプリ</title>
<style>
  body { font-family: 'Helvetica Neue', Arial, 'Hiragino Kaku Gothic ProN', 'Hiragino Sans', Meiryo, sans-serif; background-color: #f4f7f6; color: #333; margin: 0; padding: 20px; }
  .container { max-width: 600px; margin: 0 auto; background: #fff; padding: 30px; border-radius: 8px; box-shadow: 0 4px 10px rgba(0,0,0,0.1); }
  .screen { display: none; }
  .screen.active { display: block; }
  h2 { text-align: center; color: #2c3e50; }
  .form-group { margin-bottom: 20px; }
  label { display: block; font-weight: bold; margin-bottom: 5px; }
  input[type="text"], input[type="password"], textarea { width: 100%; padding: 10px; border: 1px solid #ccc; border-radius: 4px; box-sizing: border-box; font-size: 16px; }
  textarea { height: 120px; resize: vertical; }
  button { width: 100%; padding: 12px; background-color: #3498db; color: white; border: none; border-radius: 4px; font-size: 16px; cursor: pointer; margin-bottom: 10px; transition: 0.3s; }
  button:hover { background-color: #2980b9; }
  .btn-secondary { background-color: #95a5a6; }
  .btn-secondary:hover { background-color: #7f8c8d; }
  .btn-mode { height: 80px; font-size: 18px; margin-bottom: 20px; background-color: #2ecc71; }
  .btn-mode:hover { background-color: #27ae60; }
  .btn-copy { background-color: #e67e22; width: auto; padding: 8px 16px; font-size: 14px; display: block; margin-left: auto; }
  .btn-copy:hover { background-color: #d35400; }
  pre { background-color: #282c34; color: #abb2bf; padding: 15px; border-radius: 4px; white-space: pre-wrap; font-family: monospace; font-size: 14px; position: relative; }
  #loading { display: none; text-align: center; font-weight: bold; color: #3498db; margin: 15px 0; }
</style>
</head>
<body>

<div class="container">
  
  <div id="screen1" class="screen active">
    <h2>ログイン</h2>
    <div class="form-group">
      <label>Googleアカウント (メールアドレス)</label>
      <input type="text" id="email" placeholder="example@gmail.com">
    </div>
    <div class="form-group">
      <label>パスワード</label>
      <input type="password" id="password" placeholder="••••••••">
    </div>
    <div class="form-group">
      <label>Gemini APIキー</label>
      <input type="password" id="apiKey" placeholder="AI Studioで取得したAPIキーを入力">
    </div>
    <button onclick="login()">ログイン</button>
  </div>

  <div id="screen2" class="screen">
    <h2>メニュー選択</h2>
    <p style="text-align: center;">どのような作業を行いますか？</p>
    <button class="btn-mode" onclick="selectMode('reply')">📧 メールの返信を作成する</button>
    <button class="btn-mode" onclick="selectMode('edit')" style="background-color: #9b59b6;">📝 文章を推敲する</button>
    <button class="btn-secondary" onclick="showScreen('screen1')">ログアウト</button>
  </div>

  <div id="screen3" class="screen">
    <h2 id="modeTitle">入力画面</h2>
    <div class="form-group">
      <label>対象の「文章」を入力</label>
      <textarea id="inputText" placeholder="相手からのメールや、推敲したい文章をここに入力してください。"></textarea>
    </div>
    <div class="form-group">
      <label>「方向性や要件」を入力</label>
      <textarea id="reqText" placeholder="例：お詫びのトーンで。明日の15時に変更可能か聞いて。"></textarea>
    </div>
    
    <button id="execBtn" onclick="generateContent()">実行する</button>
    <button class="btn-secondary" onclick="showScreen('screen2')">戻る</button>

    <div id="loading">AIが考え中です...少々お待ちください...</div>

    <div id="resultArea" style="display: none; margin-top: 30px;">
      <div style="display: flex; justify-content: space-between; align-items: flex-end; margin-bottom: 10px;">
        <label style="margin-bottom: 0;">回答結果 (Plain Text)</label>
        <button class="btn-copy" onclick="copyToClipboard()">コピーする</button>
      </div>
      <pre><code id="outputText"></code></pre>
    </div>
  </div>

</div>

<script>
  let currentMode = '';
  let userApiKey = '';

  // ページ読み込み時に保存されたデータを復元する
  window.onload = function() {
    const savedEmail = localStorage.getItem('appEmail');
    const savedPass = localStorage.getItem('appPass');
    const savedApiKey = localStorage.getItem('appApiKey');

    if (savedEmail) document.getElementById('email').value = savedEmail;
    if (savedPass) document.getElementById('password').value = savedPass;
    if (savedApiKey) document.getElementById('apiKey').value = savedApiKey;
  };

  // 画面切り替え処理
  function showScreen(screenId) {
    document.querySelectorAll('.screen').forEach(el => el.classList.remove('active'));
    document.getElementById(screenId).classList.add('active');
    
    if (screenId === 'screen3') {
      document.getElementById('resultArea').style.display = 'none';
      document.getElementById('inputText').value = '';
      document.getElementById('reqText').value = '';
    }
  }

  // ログイン処理（データの保存）
  function login() {
    const emailVal = document.getElementById('email').value;
    const passVal = document.getElementById('password').value;
    userApiKey = document.getElementById('apiKey').value.trim();

    // 入力された内容をブラウザのローカルストレージに保存
    localStorage.setItem('appEmail', emailVal);
    localStorage.setItem('appPass', passVal);
    localStorage.setItem('appApiKey', userApiKey);

    if (!userApiKey) {
      alert("※Gemini APIキーを入力してください。\n(キーがない場合は画面遷移のみ確認できます)");
    }
    showScreen('screen2');
  }

  // モード選択処理
  function selectMode(mode) {
    currentMode = mode;
    const title = mode === 'reply' ? '📧 メール返信の作成' : '📝 文章の推敲';
    const btnText = mode === 'reply' ? '返信を生成する' : '推敲する';
    
    document.getElementById('modeTitle').innerText = title;
    document.getElementById('execBtn').innerText = btnText;
    showScreen('screen3');
  }

  // Gemini API呼び出し処理
  async function generateContent() {
    const inputText = document.getElementById('inputText').value.trim();
    const reqText = document.getElementById('reqText').value.trim();

    if (!inputText) {
      alert("「文章」を入力してください。");
      return;
    }

    if (!userApiKey) {
      alert("APIキーが設定されていません。ログアウトして入力画面に戻ってください。");
      return;
    }

    document.getElementById('loading').style.display = 'block';
    document.getElementById('resultArea').style.display = 'none';

    // システムプロンプトの切り替え
    let systemInstruction = "";
    if (currentMode === 'reply') {
      systemInstruction = `
あなたは優秀なビジネスパーソンです。ユーザーから提供された「相手の文章」と「方向性や要件」をもとに、メールの返信文を作成してください。
【出力条件】
・相手に敬意を払い、丁寧かつ適度にフランクで自然なトーンにすること。
・相手の文章の過度なオウム返しは避け、自分の言葉で自然に受け答えをすること。
・難しい言葉や大げさな表現は避け、AIっぽさのない人間らしい文章にすること。
・冗長な表現を削り、要点が端的に伝わる文章にすること。
・「よろしく」はすべて「宜しく」に統一すること。
・文章内（文末や文頭含む）に半角スペースは絶対に入れないこと。
・挨拶や解説、修正箇所の説明などは一切出力せず、生成した返信文のみを出力すること。
・絶対にマークダウン記法を使わず、プレーンテキスト形式のみで出力すること。

【署名】
メールの末尾には、必ず以下の署名をそのまま追加してください。
テレビ朝日ＡＩ推進部
井長英嗣
03-6406-2103
090-7406-7939
icho@tv-asahi.co.jp`;
    } else {
      systemInstruction = `
あなたはプロの編集者です。ユーザーから提供された「文章」と「方向性や要件」をもとに、読みやすく洗練された文章に推敲してください。
【推敲条件】
・文末表現は、入力された文章に合わせて臨機応変に対応すること。
・元の文章のニュアンスや主張は絶対に変えないこと。
・冗長な表現を削り、簡潔にすること。一文が長すぎる場合は適宜分割すること。
・主語と述語のねじれを解消し、論理的でスムーズな繋がりにすること。
・同じ文末（「〜です」「〜ます」など）が3回以上連続しないように、文章のリズムを整えること。
・漢字が連続しすぎて堅苦しくならないよう、ひらがなとのバランスを意識して視覚的に読みやすくすること。
・難しい言葉をあまり使わず、AIっぽさ（「〜と言えるでしょう」「結論として」などの定型句や大げさな表現）を出さないで自然な人間の文章にすること。
・「よろしく」はすべて「宜しく」に統一すること。
・文章内（文末や文頭含む）に半角スペースは絶対に入れないこと。
・挨拶や解説、修正箇所の説明などは一切出力せず、推敲後の文章のみを出力すること。
・絶対にマークダウン記法を使わず、プレーンテキスト形式のみで出力すること。`;
    }

    const userPrompt = `
【入力された文章】
${inputText}

【方向性や要件】
${reqText}
`;

    try {
      // APIバージョンを gemini-2.5-flash に修正済み
      const response = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash:generateContent?key=${userApiKey}`, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({
          system_instruction: {
            parts: { text: systemInstruction }
          },
          contents: [
            { parts: [{ text: userPrompt }] }
          ],
          generationConfig: {
            temperature: 0.7,
          }
        })
      });

      const data = await response.json();
      
      if (data.error) {
        throw new Error(data.error.message);
      }

      let resultText = data.candidates[0].content.parts[0].text;
      
      // バッククォートや不要なMarkdown記号が混入した場合の安全策として除去
      resultText = resultText.replace(/^```[a-z]*\n?/gm, '').replace(/```$/gm, '').trim();

      document.getElementById('outputText').innerText = resultText;
      document.getElementById('resultArea').style.display = 'block';

    } catch (error) {
      alert("エラーが発生しました: " + error.message);
    } finally {
      document.getElementById('loading').style.display = 'none';
    }
  }

  // クリップボードにコピー
  function copyToClipboard() {
    const text = document.getElementById('outputText').innerText;
    navigator.clipboard.writeText(text).then(() => {
      alert("クリップボードにコピーしました！");
    }).catch(err => {
      alert("コピーに失敗しました。手動でコピーしてください。");
    });
  }
</script>

</body>
</html>
